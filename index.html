<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GOART v0.3.0-dev — Рабочий день в типографии</title>
  <style>
    :root {
      --header-height: 52px;
      --footer-height: 138px;
      --bg: #dde6ef;
      --panel: #f8fafc;
      --room: #f4f7fb;
      --room-active: #ffffff;
      --line: #b7c3d3;
      --blue: #245a9d;
      --blue-2: #2d77c9;
      --green: #4e9f75;
      --danger: #be4d58;
      --text: #123656;
      --muted: #697891;
      --shadow: 0 10px 28px rgba(20, 57, 103, .13);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #f7fbff 0, var(--bg) 42%, #cdd9e6 100%);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }
    button { font: inherit; }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      min-height: var(--header-height);
      background: linear-gradient(135deg, #1d4f8f, #2d77c9);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      font-size: 1.03em;
      font-weight: 700;
      text-align: center;
      padding: 9px 12px;
      box-shadow: 0 2px 14px rgba(0, 0, 0, .16);
    }

    #main-wrap {
      position: absolute;
      top: var(--header-height);
      left: 0; right: 0;
      bottom: var(--footer-height);
      padding: 12px;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .content { width: 100%; max-width: 1040px; }

    #map {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }
    .room {
      background: var(--room);
      border: 1.5px solid var(--line);
      border-radius: 15px;
      min-height: 108px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      overflow: hidden;
      padding: 10px 9px 8px;
      word-break: break-word;
      box-shadow: 0 4px 14px rgba(20, 57, 103, .08);
    }
    .room.active {
      border-color: #2d9cff;
      box-shadow: 0 0 0 3px rgba(45, 156, 255, .18), var(--shadow);
      background: var(--room-active);
    }
    .room-title {
      font-weight: 700;
      font-size: 1.03em;
      margin-bottom: 5px;
      line-height: 1.18;
      overflow-wrap: break-word;
    }
    .room-title.long { font-size: .92em; }
    .actors {
      margin-top: 5px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px 6px;
      min-height: 40px;
      align-content: flex-start;
    }
    .actor {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-size: 1.45em;
      min-width: 42px;
      max-width: 70px;
      overflow: hidden;
      line-height: 1;
    }
    .actor-name {
      margin-top: 2px;
      font-size: .62em;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70px;
      text-align: center;
      white-space: normal;
      line-height: 1.12;
    }
    .actor-name.long { font-size: .5em; }
    .actor-ego { color: #0a4b8e; font-weight: 700; }
    .actor-npc { color: #25384f; }
    .doors {
      margin-top: auto;
      color: var(--muted);
      font-size: .74em;
      line-height: 1.16;
      padding-top: 5px;
    }

    #questlog {
      margin: 12px 0 10px;
      background: rgba(248, 250, 252, .96);
      border: 1px solid #cbd4df;
      border-radius: 12px;
      padding: 9px 12px;
      box-shadow: 0 3px 12px rgba(20, 57, 103, .07);
    }
    #questlog ul { margin: 0; padding-left: 18px; }
    #questlog li { margin: 3px 0; }
    .actor-desc { color: var(--muted); font-size: .92em; }
    .legend-open {
      margin: 4px 0 18px;
      padding: 7px 18px;
      border-radius: 9px;
      border: 1px solid #adc0d6;
      background: #fff;
      color: var(--blue);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(20,57,103,.08);
    }

    #footer {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      min-height: var(--footer-height);
      background: rgba(248, 250, 252, .98);
      color: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      font-size: .94em;
      border-top: 1px solid var(--line);
      box-shadow: 0 -3px 16px rgba(20, 57, 103, .12);
      flex-direction: column;
      gap: 5px;
      padding: 8px 10px 10px;
      text-align: center;
    }
    .statusline, .questline { line-height: 1.25; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 5px;
      max-width: 1020px;
    }

    .actionBtn, .moveBtn {
      border: none;
      border-radius: 9px;
      padding: 6px 11px;
      cursor: pointer;
      background: var(--blue-2);
      color: #fff;
      transition: transform .12s, background .18s, color .18s, box-shadow .18s;
      box-shadow: 0 2px 7px rgba(45, 119, 201, .22);
      margin: 1px;
    }
    .moveBtn[disabled] { background: #c4cbe2; color: #f7f7ff; cursor: not-allowed; box-shadow: none; }
    .actionBtn { background: var(--green); }
    .actionBtn:hover, .moveBtn:hover:enabled { background: #143967; transform: translateY(-1px); }

    #eventBox {
      display: none;
      position: fixed;
      z-index: 500;
      left: 0; right: 0; top: 0; bottom: 0;
      background: rgba(18, 37, 59, .28);
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .event-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      max-width: 450px;
      width: min(450px, 100%);
      box-shadow: 0 16px 44px rgba(20, 57, 103, .28);
      text-align: center;
    }
    #eventPortrait { text-align:center; margin:2px 0 8px; }
    #eventPortrait img { max-width: 132px; max-height: 132px; border-radius: 16px; box-shadow: 0 2px 18px rgba(70,137,255,.15); display:block; margin: 0 auto; object-fit: cover; }
    #eventText { min-width:220px; text-align:center; font-size:1.08em; margin-bottom:12px; line-height: 1.35; }
    #eventOptions { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
    .timer { color: var(--muted); font-size: .86em; }

    #descModal {
      display: none;
      position:fixed;
      z-index:999;
      left:0; right:0; top:0; bottom:0;
      background:rgba(235,245,255,.99);
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 16px;
    }
    #legendCont {
      background:#fafcff;
      border-radius:16px;
      margin:24px auto;
      max-width:620px;
      width:100%;
      font-size:.98em;
      color:#123656;
      padding:24px;
      box-shadow:0 2px 32px rgba(70,137,255,.13);
    }
    #legendCont h2 { margin: 0 0 8px; }
    #legendCont ul { margin: 6px 0 12px; padding-left: 20px; }
    #legendCont li { margin-bottom: 5px; }

    @media (max-width: 900px) {
      #map { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .room { min-height: 96px; }
    }
    @media (max-width: 620px) {
      :root { --header-height: 46px; --footer-height: 168px; }
      #header { font-size: .9em; padding: 7px 8px; }
      #main-wrap { padding: 8px 6px; }
      #map { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
      .room { min-height: 84px; padding: 7px 6px; border-radius: 12px; }
      .room-title { font-size: .88em; }
      .actors { min-height: 30px; gap: 3px; }
      .actor { font-size: 1.13em; min-width: 32px; max-width: 52px; }
      .actor-name { font-size: 9px; max-width: 52px; }
      .doors { font-size: .66em; }
      #questlog { font-size: .88em; padding: 7px 9px; }
      #footer { font-size: .8em; padding: 6px; }
      .actionBtn, .moveBtn { padding: 5px 7px; border-radius: 8px; }
      .event-card { padding: 14px; }
    }
    @media (max-width: 380px) {
      :root { --footer-height: 184px; }
      .room { min-height: 78px; }
      .room-title { font-size: .82em; }
      #questlog { display: none; }
    }
    @media (max-height: 420px) {
      :root { --header-height: 38px; --footer-height: 118px; }
      #main-wrap { padding: 5px; }
      .room { min-height: 58px; }
      #questlog { display: none; }
      #footer { font-size: .78em; }
    }
  </style>
</head>
<body>
  <div id="header">🚀 GOART v0.3.0-dev — Рабочий день в типографии</div>
  <div id="main-wrap">
    <main class="content">
      <div id="map"></div>
      <div id="questlog"><ul></ul></div>
      <button class="legend-open" onclick="legendOpen()">Справка (локации/персонажи)</button>
    </main>
  </div>
  <div id="footer"></div>
  <div id="eventBox">
    <div class="event-card">
      <div id="eventPortrait"></div>
      <div id="eventText"></div>
      <div id="eventOptions"></div>
    </div>
  </div>
  <div id="descModal">
    <div id="legendCont">
      <h2>Справка</h2>
      <button onclick="legendClose()" class="actionBtn">Закрыть</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
